name: Daily Bangladesh Intel Report

# 触发条件：
# 1. 每天北京时间 07:00（UTC 23:00）自动运行
# 2. 允许手动点击运行（方便测试）
on:
  schedule:
    - cron: '0 23 * * *'    # UTC 23:00 = 北京时间次日 07:00
  workflow_dispatch:         # 手动触发按钮

# 权限设置：允许写入 gh-pages 分支
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: 设置 Python 环境
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Step 3: 安装依赖
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # Step 4: 运行主程序（正式模式）
      - name: Run Intel Engine
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
        run: |
          echo "Starting Bangladesh Intel Daily..."
          python src/main.py
          echo "Report generation complete"

      # Step 5: 部署到 GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Auto-generate daily intel report'
